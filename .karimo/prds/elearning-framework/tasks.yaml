  - id: T07
    title: "Certificate generation (2-tier PDF + expiry)"
    wave: 3
    complexity: 3
    priority: must
    status: pending
    model: sonnet
    require_review: false
    depends_on: [T00, T01, T03, T04, T06]
    files_affected:
      - src/components/lms/CertificateViewer.tsx
      - src/components/lms/CertificateViewer.module.css
      - src/app/api/lms/certificate/route.ts
    description: >
      Create POST /api/lms/certificate route handler: auth guard. Receives { courseId }.
      Reads lessonProgress for the course to get postTestScore. Compares to course.passingScore.
      Determines tier: 'accomplishment' if score >= passingScore, else 'participation'.
      Generates PDF using @react-pdf/renderer with:
        - PharmaLink logo/branding
        - Learner name (from Clerk user)
        - Course name
        - Tier label ("Certificate of Participation" or "Certificate of Accomplishment")
        - Issue date
        - Expiry date
        - Unique certificate ID (cert_userId_courseId)
      Uploads PDF to @vercel/blob (private access). Writes certificate document to Sanity
      (_id: cert_userId_courseId, tier, score, issuedAt, blobUrl). Returns { blobUrl, tier }.
      Build CertificateViewer client component: renders certificate preview, download button,
      and tier badge. Shown after survey completion.
      Set certificate.expiresAt = issuedAt + 365 days (1 year renewal cycle).
      Include expiry date on PDF certificate.
      After writing certificate document to Sanity, write a notification document:
        { _id: 'notif_${userId}_certready_${courseId}', userId, type: 'certificate_ready',
          message: 'Your certificate for [course name] is ready to download.',
          courseId, read: false, createdAt: now }
      Send certificate-ready email via Clerk email API (same pattern as T02 welcome email).
    acceptance_criteria:
      - Participation certificate issued on course completion regardless of score
      - Accomplishment certificate issued only when postTestScore >= course.passingScore
      - PDF contains learner name, course name, tier, issue date, certificate ID
      - certificate document written to Sanity with correct tier
      - Download link works (Vercel Blob URL)
      - npx tsc --noEmit passes
      - certificate.expiresAt set to issuedAt + 365 days
      - Expiry date appears on PDF
      - notification document written on certificate issuance
      - Certificate-ready email sent via Clerk

  - id: T08
    title: "Dashboard GROQ + analytics queries"
    wave: 3
    complexity: 4
    priority: must
    status: pending
    model: sonnet
    require_review: false
    depends_on: [T00, T01, T03, T04, T05, T06]
    files_affected:
      - src/sanity/lib/dashboardQueries.ts
      - src/app/api/lms/dashboard/route.ts
    description: >
      Create src/sanity/lib/dashboardQueries.ts with typed GROQ queries for each metric.
      All queries accept { country?, gender?, ageGroup?, learnerType? } filter params.
      Role scoping: Program Manager queries add `&& country == $userCountry` filter;
      Program Director/System Admin queries are unrestricted.
      Denormalized filter fields (gender, ageGroup, healthWorkerType, country) are written onto
      lessonProgress and surveyResponse documents at creation time (by T03/T05/T06) — use these
      fields directly in GROQ filter params. Do NOT query Clerk API for filter dimensions.
      Queries:
        - CSAT: avg(surveyResponse.csatScore) grouped by filters
        - NPS: count(npsScore >= 9) / count(total) * 100 grouped by filters
        - Knowledge gain: avg(postTestScore - preTestScore) across lessonProgress docs
        - DAU: count(distinct userId where completedAt > now()-1d)
        - Conversion rate: count(completed courses) / count(enrolled users) * 100
        - Retention: count(userId active in last 12 months)
        - New users by country: count(new lms_registered users) by country per month
        - Knowledge base growth: count(courses) by month
      Create GET /api/lms/dashboard route handler: auth guard + role check (block learner role),
      calls dashboardQueries with user's role + country from sessionClaims, returns JSON.
      Additional queries:
      getExpiringCertificates({ daysAhead = 30, country? }): returns certificates where
        expiresAt < now() + daysAhead days AND expiresAt > now(), with learner userId and courseId.
        Used for admin expiry alert widget and notification trigger.
      getEnrollmentsByCountry({ country? }): count of enrollment documents grouped by country,
        filtered by date range. Returns Array<{ country: string; month: string; count: number }>.
      getInactiveLearners({ daysSince = 7, country? }): count of users with no lessonProgress
        documents updated in the last daysSince days. Used by T10 notification worker.
    acceptance_criteria:
      - All 8 metrics return correct values from Sanity GROQ
      - Program Manager queries restricted to own country
      - Program Director/Admin queries unrestricted
      - Learner role returns 403
      - All queries are typed via sanity.types.ts
      - npx tsc --noEmit passes
      - getExpiringCertificates returns certs expiring within N days
      - getEnrollmentsByCountry returns enrollment counts grouped by country+month
      - getInactiveLearners returns count of users with no activity in N days

