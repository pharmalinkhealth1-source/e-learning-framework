  - id: T01
    title: "Sanity schemas + typegen"
    wave: 1
    complexity: 3
    priority: critical
    status: pending
    model: sonnet
    require_review: true
    depends_on: []
    files_affected:
      - src/sanity/schemaTypes/course.ts
      - src/sanity/schemaTypes/courseModule.ts
      - src/sanity/schemaTypes/lesson.ts
      - src/sanity/schemaTypes/lessonProgress.ts
      - src/sanity/schemaTypes/surveyResponse.ts
      - src/sanity/schemaTypes/certificate.ts
      - src/sanity/schemaTypes/enrollment.ts
      - src/sanity/schemaTypes/notification.ts
      - src/sanity/schemaTypes/index.ts
      - src/sanity/schemaTypes/quiz.ts
      - src/sanity/lib/lms-fallbacks.ts
      - src/types/lms.ts
    description: >
      Create six new Sanity v5 schemas using defineField/defineType (named exports):
      course (title, slug, description, modules[], passingScore: number, country: string[]),
      courseModule (title, slug, lessons[]),
      lesson (title, slug, type enum [text|scorm|quiz], content portable text, scormPackage file,
        scormEntryUrl string — hidden by type, questions[], quizRole enum [pre-test|post-test|self-assessment]),
      lessonProgress (_id: lp_userId_lessonId, userId, lessonId, lessonShortId string (8-char),
        courseId, completed boolean, preTestScore number, postTestScore number,
        scormData object, timeSpent number, completedAt datetime,
        gender string, ageGroup string, healthWorkerType string, country string),
      surveyResponse (_id: sr_userId_courseId, userId, courseId, csatScore number 1-5,
        npsScore number 0-10, completedAt datetime,
        gender string, ageGroup string, healthWorkerType string, country string),
      certificate (_id: cert_userId_courseId, userId, courseId, tier enum [participation|accomplishment],
        score number, issuedAt datetime, expiresAt datetime, blobUrl string).
      enrollment (_id: enrol_userId_courseId, userId string, courseId string,
        enrolledAt datetime, country string, source enum [auto|manual]),
      notification (_id: notif_userId_timestamp, userId string,
        type enum [enrollment|completion|certificate_ready|certificate_expiring|inactivity],
        read boolean default false, message string, courseId string, createdAt datetime).
      Register enrollment and notification in schemaTypes/index.ts.
      Register all schemas in schemaTypes/index.ts.
      Create src/sanity/schemaTypes/quiz.ts with question object type:
        { questionText string, options string[], correctIndex number }.
        Import and use in lesson.ts questions[] field and quizRole enum [pre-test|post-test|self-assessment].
      Create src/types/lms.ts with shared TypeScript interfaces: LmsRole ('learner'|'program_manager'|'partner_donor'|'system_admin'),
        CertificateTier ('participation'|'accomplishment'), DashboardFilters ({ country?, gender?, ageGroup?, learnerType? }),
        QuizSubmission ({ courseId, lessonId, answers, quizRole }), DashboardMetrics (all 8 metric fields typed).
      Create src/sanity/lib/lms-fallbacks.ts with mock data entries for course, lesson, lessonProgress
        (for local dev without Sanity connection). Do NOT modify src/sanity/lib/client.ts.
      Note: gender/ageGroup/healthWorkerType/country are denormalized from Clerk metadata at write time
        for dashboard GROQ filtering.
      Run `npx sanity typegen generate` after all schema additions and commit the generated sanity.types.ts.
    acceptance_criteria:
      - All six schemas defined with correct field types and validation
      - All six registered in schemaTypes/index.ts
      - lessonProgress schema includes preTestScore, postTestScore, lessonShortId, gender, ageGroup, healthWorkerType, country fields
      - src/types/lms.ts created with LmsRole, CertificateTier, DashboardFilters, QuizSubmission, DashboardMetrics types
      - src/sanity/lib/lms-fallbacks.ts created (no changes to src/sanity/lib/client.ts)
      - npx sanity typegen generate runs without errors
      - sanity.types.ts committed to repo
      - npx tsc --noEmit passes after schema addition
      - enrollment schema created and registered
      - notification schema created and registered
      - certificate schema includes expiresAt field

  - id: T02
