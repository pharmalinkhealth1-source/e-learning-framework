      2. Certificate ready (handled in T07 — email + Sanity doc, no new work here)
      3. Certificate expiring (30-day warning): POST /api/lms/notifications/send-expiry-warnings
         reads getExpiringCertificates (from T08), for each cert: check if expiry-warning
         notification already sent (idempotent via _id: notif_userId_certexpiring_courseId),
         if not: write notification document + send email via Clerk API.
      4. Inactivity nudge (7-day): check getInactiveLearners (from T08), for each userId:
         write notification document + send email (idempotent via _id: notif_userId_inactive_YYYY-WW).

      Build GET /api/lms/notifications route handler: auth guard, returns notification
      documents for current userId, sorted by createdAt desc, limit 20.

      Build POST /api/lms/notifications/mark-read route handler: auth guard, accepts
      { notificationId } or { all: true }, sets notification.read = true via writeClient.

      Build NotificationFeed client component: renders list of notifications with
      read/unread state, "Mark all read" button. Used in /elearning/my-learning (T03).
      CSS Module + --hds-* tokens. Notification bell icon with unread count badge in
      PlayerShell header (add bell to PlayerShell layout in T03 — note this as a
      cross-task dependency for T03 to leave a slot).

      Note: The send-expiry-warnings and inactivity routes are designed to be called
      by a cron job or manual admin trigger — not by learners. Add role check:
      system_admin only for these two routes.
    acceptance_criteria:
      - GET /api/lms/notifications returns notifications for current user
      - POST /api/lms/notifications/mark-read marks single or all notifications as read
      - send-expiry-warnings writes notification docs and sends emails (idempotent)
      - Inactivity nudge writes notification docs and sends emails (idempotent, weekly)
      - NotificationFeed renders with read/unread states and mark-all-read
      - system_admin gate on send-expiry-warnings and inactivity routes
      - npx tsc --noEmit passes
